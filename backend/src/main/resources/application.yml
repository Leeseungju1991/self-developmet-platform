server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:selfdev;DB_CLOSE_DELAY=-1;MODE=MySQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  cache:
    type: simple

app:
  jwt:
    issuer: self-dev-platform
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_FOR_PROD"
    accessTokenMinutes: 30
    refreshTokenDays: 14
